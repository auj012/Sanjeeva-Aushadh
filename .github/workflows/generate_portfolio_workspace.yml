name: 🚀 Auto-Generate Agile Workspace

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-structure:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📁 Generate Complete Modular Trilogy Layout
        run: |
          python -c "
          import os
          import shutil
          import subprocess

          # Hardcoded blueprint mapping for all 3 clinical phases with their data, code, and tests grouped together
          trilogy_blueprint = [
              '01_ideation/platform_master_vision.md',
              '02_product_spec/system_prd_trilogy.md',
              '03_architecture/system_design_matrix.md',
              '04_project_mgmt/master_roadmap.md',
              '05_qa_evals/quality_assurance_matrix.md',
              'phase1_divya_drishti/core_engine.py',
              'phase1_divya_drishti/data_generator.py',
              'phase1_divya_drishti/test_suite.py',
              'phase2_lakshman_rekha/core_engine.py',
              'phase2_lakshman_rekha/data_generator.py',
              'phase2_lakshman_rekha/test_suite.py',
              'phase3_sanjeevani/core_engine.py',
              'phase3_sanjeevani/data_generator.py',
              'phase3_sanjeevani/test_suite.py',
              'CHANGELOG.md'
          ]

          # Wipe old directories to avoid remnants and guarantee an immaculate repo root
          for old_dir in ['01_ideation', '02_product_spec', '03_architecture', '04_project_mgmt', '06_qa_evals', '05_qa_evals', 'src', 'tests', 'phase1_divya_drishti_src', 'phase1_divya_drishti', 'phase2_lakshman_rekha', 'phase3_sanjeevani', 'documentation', 'data', 'docs', 'notebooks']:
              if os.path.exists(old_dir):
                  shutil.rmtree(old_dir)

          # Rebuild using the sleek modular phase-contained blueprint
          for filepath in trilogy_blueprint:
              dirname = os.path.dirname(filepath)
              if dirname:
                  os.makedirs(dirname, exist_ok=True)
              with open(filepath, 'w', encoding='utf-8') as f:
                  if filepath.endswith('.md'):
                      f.write(f'# {os.path.basename(filepath).replace(\"_\", \" \").replace(\".md\", \"\").title()}\n\nMaster placeholder documentation for Sanjeeva-Aushadh.\n')
                  else:
                      f.write(f'#!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\n\"\"\"\nSanjeeva-Aushadh Component: {os.path.dirname(filepath)}\n\"\"\"\n')
              print(f'Generated trilogy structural asset: {filepath}')

          # Commit changes directly back to your branch
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'])
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'])
          subprocess.run(['git', 'add', '.'])
          subprocess.run(['git', 'commit', '-am', '🚀 built self-contained ecosystems for all 3 production trilogy modules', '--allow-empty'])
          subprocess.run(['git', 'push'])
          print('✅ Full Sanjeeva-Aushadh layout structured successfully!')
          "
