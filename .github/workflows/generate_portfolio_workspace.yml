name: 🚀 Auto-Generate Agile Workspace

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-structure:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 📁 Generate Consolidated Elite Structure
        run: |
          python -c "
          import os
          import shutil
          import subprocess

          # 1. Define the sleek, consolidated master file layout
          elite_blueprint = [
              '01_ideation/platform_master_vision.md',
              '02_product_spec/system_prd_trilogy.md',
              '03_architecture/system_design_matrix.md',
              '04_project_mgmt/master_roadmap.md',
              '05_qa_evals/quality_assurance_matrix.md',
              'src/data_generator.py',
              'src/core_trilogy_engine.py',
              'tests/test_suite.py',
              'CHANGELOG.md'
          ]

          # Wipe out the entire existing directory structure to ensure a perfectly clean slate
          for old_dir in ['01_ideation', '02_product_spec', '03_architecture', '04_project_mgmt', '06_qa_evals', '05_qa_evals', 'src', 'tests', 'documentation', 'data', 'docs', 'notebooks']:
              if os.path.exists(old_dir):
                  shutil.rmtree(old_dir)

          # Rebuild only the consolidated files
          for filepath in elite_blueprint:
              dirname = os.path.dirname(filepath)
              if dirname:
                  os.makedirs(dirname, exist_ok=True)
              with open(filepath, 'w', encoding='utf-8') as f:
                  if filepath.endswith('.md'):
                      f.write(f'# {os.path.basename(filepath).replace(\"_\", \" \").replace(\".md\", \"\").title()}\n\nMaster placeholder documentation for Sanjeeva-Aushadh.\n')
                  else:
                      f.write('#!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\n\"\"\"\nSanjeeva-Aushadh Production Asset\n\"\"\"\n')
              print(f'Generated consolidated asset: {filepath}')

          # Commit changes cleanly
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'])
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'])
          subprocess.run(['git', 'add', '.'])
          subprocess.run(['git', 'commit', '-am', '🚀 consolidated repository into sleek high-impact master files', '--allow-empty'])
          subprocess.run(['git', 'push'])
          print('✅ Master transformation complete!')
          "
