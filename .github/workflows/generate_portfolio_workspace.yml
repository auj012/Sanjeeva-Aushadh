name: 🚀 Auto-Generate Agile Workspace

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  build-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🤖 Parse Backlog and Generate GitHub Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import json
          import subprocess
          import sys

          try:
              with open('tasks.json', 'r', encoding='utf-8') as f:
                  tasks = json.load(f)
          except Exception as e:
              print(f'❌ ERROR reading tasks.json: {e}')
              sys.exit(1)

          for task in tasks:
              title = task.get('title', 'Untitled Task')
              body = task.get('body', '')
              labels_list = task.get('labels', [])
              labels = ','.join(labels_list) if isinstance(labels_list, list) else str(labels_list)
              
              print(f'Creating issue: {title}')
              
              cmd = ['gh', 'issue', 'create', '--title', title, '--body', body]
              if labels:
                  cmd.extend(['--label', labels])
                  
              res = subprocess.run(cmd, capture_output=True, text=True)
              if res.returncode != 0:
                  print(f'⚠️ Warning creating issue: {res.stderr}')
          "
