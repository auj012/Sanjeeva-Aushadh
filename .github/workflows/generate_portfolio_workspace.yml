name: 🚀 Auto-Generate Agile Workspace

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📁 Automatically Generate Folder Structure
        run: |
          python -c "
          import json
          import os
          import subprocess

          try:
              with open('tasks.json', 'r', encoding='utf-8') as f:
                  tasks = json.load(f)
          except Exception as e:
              print(f'❌ ERROR reading tasks.json: {e}')
              exit(1)

          # Parse structural pathways from tasks.json
          created_any = False
          for task in tasks:
              # Check for file paths or deliverables specified in your JSON
              filepath = task.get('filepath') or task.get('file_path') or task.get('deliverable')
              
              if filepath and not isinstance(filepath, list):
                  # Extract directory path
                  dirname = os.path.dirname(filepath)
                  if dirname:
                      os.makedirs(dirname, exist_ok=True)
                      print(f'Creating directory structure: {dirname}')
                  
                  # Create the file with a markdown template if it doesn't exist
                  if not os.path.exists(filepath):
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(f'# {task.get(\"title\", \"Project File\")}\n\nPlaceholder for {task.get(\"description\", \"deliverable\")}.\n')
                      print(f'Created placeholder file: {filepath}')
                      created_any = True

          if created_any:
              # Configure git runner to commit the files back to your repo
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'])
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', '🚀 automated creation of project folder structure'])
              subprocess.run(['git', 'push'])
              print('✅ Folders and files successfully pushed to repository!')
          else:
              print('⚠️ No folder configuration matches found in tasks.json. Creating standard defaults.')
              # Fallback to create standard data science/AI trilogy folders
              for folder in ['docs', 'data/raw', 'data/processed', 'notebooks', 'src/models', 'src/pipeline']:
                  os.makedirs(folder, exist_ok=True)
                  with open(f'{folder}/.gitkeep', 'w') as f: pass
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'])
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', '🚀 automated creation of default trilogy structure'])
              subprocess.run(['git', 'push'])
          "
